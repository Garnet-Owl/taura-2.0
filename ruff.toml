line-length = 92
target-version = "py312"
preview = true

lint.dummy-variable-rgx = "^(_+|(_+[a-zA-Z0-9_]*[a-zA-Z0-9]+?))$"

# Preprocessing files contain hand-tuned regex patterns and string literals
# that must not be reformatted or have imports reordered.
lint.exclude = [
    "app/preprocessing/**",
    "app/api/preprocessing.py",
]
exclude = [
    "app/preprocessing/**",
    "app/api/preprocessing.py",
]

# E/F: pycodestyle + pyflakes  B: flake8-bugbear
# I: isort   PLC0415: catches non-top-level imports
lint.select = ["E", "F", "B", "I", "PLC0415"]
lint.ignore = ["B904", "B008", "E501"]

[lint.isort]
known-first-party = ["app"]

[lint.per-file-ignores]
"__init__.py" = ["E402", "F401"]
# Optional SDK imports (torch/hnswlib) are guarded by availability checks — must stay inline
"app/api/embeddings.py" = ["PLC0415"]

[format]
quote-style = "double"
indent-style = "space"
line-ending = "auto"
